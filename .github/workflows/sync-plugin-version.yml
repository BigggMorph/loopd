name: Sync Plugin Version on Release

on:
  release:
    types: [published]

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$'; then
            echo "::error::Release tag '$TAG' is not a valid semver (expected vX.Y.Z or X.Y.Z)"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update plugin.json version
        run: |
          PLUGIN_JSON="plugins/loopd/.claude-plugin/plugin.json"
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' "$PLUGIN_JSON" > "$PLUGIN_JSON.tmp"
          mv "$PLUGIN_JSON.tmp" "$PLUGIN_JSON"

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/loopd/.claude-plugin/plugin.json
          if git diff --staged --quiet; then
            echo "plugin.json already at ${{ steps.version.outputs.version }} — nothing to commit"
            exit 0
          fi
          git commit -m "chore: bump plugin version to ${{ steps.version.outputs.version }}"
          git push origin main
